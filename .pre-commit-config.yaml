default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite

ci:
  autoupdate_schedule: monthly
  skip: ["cargo-fmt"]

# cf https://pre-commit.com/#regular-expressions
exclude: |
  (?x)^(
      tests/templates/invalid.txt|
      scripts/django_tests_use_rusty_templates.patch
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: fix-byte-order-marker
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: a27a2e47c7751b639d2b5badf0ef6ff11fee893f  # frozen: v0.15.4
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 33ae92ed9b1a4392c8ac5fdef46887640d866e1e  # frozen: 0.5.0
    hooks:
      - id: cargo-fmt
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 099118db1761b62a9c5a3680a66fa6e2d973bcad  # frozen: 0.10.7
    hooks:
      - id: uv-lock
      - id: uv-sync
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: b546b77c44c466a54a42af5499dcc0dcc1a3193f  # frozen: v1.22.0
    hooks:
      - id: zizmor
  - repo: https://github.com/crate-ci/typos
    rev: 5745f2a8dd91cd7b684680e2e10a2b388ba6e5cf  # frozen: v1
    hooks:
      - id: typos
  - repo: https://github.com/DevinR528/cargo-sort
    rev: 51dbcfbf952ad54b60f33ef318b41c247c30de1c # v2.1.3
    hooks:
    - id: cargo-sort
      args: ['dtl-lexer/Cargo.toml', './Cargo.toml']
